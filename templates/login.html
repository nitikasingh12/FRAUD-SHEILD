<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login — Fraud Shield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .login-box {
    max-width: 380px;
    margin: 80px auto 0;
    background: #ffffff;
    border: 1px solid #dce6f7;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 4px 18px rgba(20, 33, 61, 0.08);
  }
  .login-box h1 { font-size: 22px; color: #0b3d91; margin: 0 0 6px; text-align: center; }
  .login-box p { color: #6b7a99; font-size: 13.5px; text-align: center; margin: 0 0 22px; }
  .login-box input {
    width: 100%; padding: 12px; margin-bottom: 12px;
    border-radius: 8px; border: 1.5px solid #d3e0f7;
    font-size: 14px; box-sizing: border-box; background: #f7faff;
  }
  .login-box button {
    width: 100%; padding: 12px; background: linear-gradient(135deg, #1a4d8f, #123a6e);
    color: white; border: none; border-radius: 8px; font-weight: 600;
    font-size: 15px; cursor: pointer;
  }
  .error { color: #a12626; font-size: 13px; text-align: center; margin-bottom: 10px; }
  .hint { color: #8291ac; font-size: 12px; text-align: center; margin-top: 14px; }
</style>
</head>
<body>
  <div class="login-box">
    <h1>Fraud Shield</h1>
    <p>Sign in to access the platform</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Sign in</button>
    </form>
    <div class="hint">Demo credentials: officer / demo123</div>
  </div>
</body>
</html>
